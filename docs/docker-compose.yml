name: utopiajs-docs

services:
  utopiajs-docs:
    build:
      context: ..
      dockerfile: docs/Dockerfile
    container_name: utopiajs-docs
    ports:
      - "127.0.0.1:60620:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
